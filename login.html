<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Impulse Academy – Connexion</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Space+Grotesk:wght@400;600;700&display=swap');

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --neon-blue:#00CFFF;
      --neon-violet:#9B5DE5;
      --neon-glow:rgba(0,207,255,0.35);
      --violet-glow:rgba(155,93,229,0.3);
      --bg-dark:#050A18;
      --bg-card:rgba(8,15,35,0.85);
      --border-subtle:rgba(0,207,255,0.18);
      --text-main:#E8F0FF;
      --text-muted:#6A7FA8;
      --red-err:#FF4D6D;
    }

    html,body{width:100%;height:100%;overflow:hidden}

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg-dark);
      display:flex;align-items:center;justify-content:center;
      position:relative;
    }

    /* ── CANVAS FOND ANIMÉ ── */
    #bg-canvas{
      position:fixed;inset:0;z-index:0;
      width:100%;height:100%;
    }

    /* ── CARD ── */
    .login-wrap{
      position:relative;z-index:10;
      width:100%;max-width:420px;
      padding:20px;
    }

    .login-card{
      background:var(--bg-card);
      border:1px solid var(--border-subtle);
      border-radius:20px;
      padding:44px 40px 40px;
      backdrop-filter:blur(24px);
      box-shadow:
        0 0 0 1px rgba(0,207,255,0.08),
        0 0 60px rgba(0,207,255,0.08),
        0 30px 60px rgba(0,0,0,0.5);
      animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn{
      from{opacity:0;transform:translateY(28px) scale(.97)}
      to{opacity:1;transform:none}
    }

    /* ── LOGO ── */
    .logo-zone{text-align:center;margin-bottom:36px}
    .logo-icon{
      display:inline-flex;align-items:center;justify-content:center;
      width:64px;height:64px;border-radius:16px;
      background:linear-gradient(135deg,rgba(0,207,255,.15),rgba(155,93,229,.2));
      border:1px solid rgba(0,207,255,.3);
      margin-bottom:16px;
      box-shadow:0 0 30px rgba(0,207,255,.2);
    }
    .logo-icon svg{width:30px;height:30px}
    .logo-name{
      font-family:'Space Grotesk',sans-serif;
      font-size:1.35rem;font-weight:700;
      background:linear-gradient(90deg,var(--neon-blue),var(--neon-violet));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:.02em;
    }
    .logo-sub{
      color:var(--text-muted);font-size:.78rem;margin-top:4px;font-weight:400;
      letter-spacing:.04em;text-transform:uppercase;
    }

    /* ── FORM ── */
    .field-group{margin-bottom:18px}
    .field-group label{
      display:block;font-size:.75rem;font-weight:600;
      color:var(--neon-blue);letter-spacing:.06em;text-transform:uppercase;
      margin-bottom:8px;
    }

    .input-wrap{position:relative}
    .input-wrap svg{
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      width:16px;height:16px;stroke:var(--text-muted);fill:none;stroke-width:2;
      stroke-linecap:round;transition:stroke .2s;pointer-events:none;
    }
    input[type=email],input[type=password]{
      width:100%;padding:13px 14px 13px 42px;
      background:rgba(0,207,255,.04);
      border:1.5px solid rgba(0,207,255,.15);
      border-radius:10px;
      color:var(--text-main);font-family:'Inter',sans-serif;font-size:.95rem;
      outline:none;transition:border-color .25s,box-shadow .25s,background .25s;
    }
    input[type=email]::placeholder,input[type=password]::placeholder{color:rgba(106,127,168,.5)}
    input[type=email]:focus,input[type=password]:focus{
      border-color:var(--neon-blue);
      background:rgba(0,207,255,.07);
      box-shadow:0 0 0 3px rgba(0,207,255,.12),0 0 20px rgba(0,207,255,.08);
    }
    input[type=email]:focus ~ svg,input[type=password]:focus ~ svg{stroke:var(--neon-blue)}
    .input-wrap input:focus + svg,
    .input-wrap:focus-within svg{stroke:var(--neon-blue)}

    /* Toggle password */
    .toggle-pwd{
      position:absolute;right:13px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;padding:4px;
      color:var(--text-muted);transition:color .2s;
    }
    .toggle-pwd:hover{color:var(--neon-blue)}
    .toggle-pwd svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

    /* ── BOUTON ── */
    .btn-login{
      width:100%;padding:15px;margin-top:8px;
      background:linear-gradient(135deg,var(--neon-blue),var(--neon-violet));
      border:none;border-radius:10px;
      color:#fff;font-family:'Inter',sans-serif;font-size:.97rem;font-weight:700;
      cursor:pointer;letter-spacing:.04em;
      box-shadow:0 0 24px rgba(0,207,255,.3),0 4px 20px rgba(0,0,0,.3);
      transition:transform .15s,box-shadow .2s,opacity .2s;
      display:flex;align-items:center;justify-content:center;gap:9px;
    }
    .btn-login:hover:not(:disabled){
      transform:translateY(-2px);
      box-shadow:0 0 40px rgba(0,207,255,.45),0 8px 28px rgba(0,0,0,.35);
    }
    .btn-login:active:not(:disabled){transform:translateY(0)}
    .btn-login:disabled{opacity:.55;cursor:not-allowed}
    .btn-login svg{width:17px;height:17px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round}
    .btn-login .spinner{
      width:17px;height:17px;border:2px solid rgba(255,255,255,.3);
      border-top-color:white;border-radius:50%;
      animation:spin .7s linear infinite;display:none;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-login.loading .spinner{display:block}
    .btn-login.loading .btn-icon,.btn-login.loading .btn-text{display:none}

    /* ── ERREUR ── */
    .err-msg{
      display:none;align-items:center;gap:8px;
      background:rgba(255,77,109,.08);
      border:1px solid rgba(255,77,109,.35);
      border-radius:9px;padding:11px 14px;
      color:var(--red-err);font-size:.83rem;font-weight:600;
      margin-bottom:18px;animation:shake .35s ease;
    }
    .err-msg.show{display:flex}
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}
      60%{transform:translateX(-4px)}
      80%{transform:translateX(4px)}
    }
    .err-msg svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0}

    /* ── FOOTER ── */
    .card-footer{
      text-align:center;margin-top:28px;
      color:var(--text-muted);font-size:.72rem;letter-spacing:.03em;
    }
    .card-footer span{
      display:inline-block;padding:4px 12px;
      background:rgba(0,207,255,.06);border:1px solid rgba(0,207,255,.12);
      border-radius:20px;color:rgba(0,207,255,.7);font-weight:600;
      font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;
      margin-top:8px;
    }

    @media(max-width:480px){
      .login-card{padding:32px 22px 28px}
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="login-wrap">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-zone">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#lg1)" stroke-width="1.8" stroke-linecap="round">
          <defs>
            <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00CFFF"/>
              <stop offset="100%" stop-color="#9B5DE5"/>
            </linearGradient>
          </defs>
          <path d="M12 2L2 7l10 5 10-5-10-5M2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-name">Impulse Academy</div>
      <div class="logo-sub">Espace sécurisé · Attestations</div>
    </div>

    <!-- Erreur -->
    <div class="err-msg" id="errMsg">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/></svg>
      <span id="errText">Email ou mot de passe incorrect</span>
    </div>

    <!-- Formulaire -->
    <form id="loginForm" onsubmit="doLogin(event)">

      <div class="field-group">
        <label for="email">Adresse email</label>
        <div class="input-wrap">
          <input type="email" id="email" name="email" placeholder="votre@email.com" required autocomplete="email"/>
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>

      <div class="field-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••••••" required autocomplete="current-password"/>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <button type="button" class="toggle-pwd" onclick="togglePwd()" title="Afficher/masquer">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <svg class="btn-icon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        <span class="btn-text">Se connecter</span>
        <div class="spinner"></div>
      </button>

    </form>

    <div class="card-footer">
      Accès réservé au personnel Impulse Academy
      <br/><span>Sécurisé · SSL · 2026</span>
    </div>

  </div>
</div>

<script>
// ── CANVAS PARTICULES RÉSEAU ────────────────────────────────
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, pts;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initPts(){
    pts = [];
    const n = Math.min(90, Math.floor(W * H / 12000));
    for(let i = 0; i < n; i++){
      pts.push({
        x: Math.random()*W, y: Math.random()*H,
        vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
        r: Math.random()*1.5+.5,
        hue: Math.random() > .5 ? 195 : 270   // cyan ou violet
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // Fond dégradé subtil
    const grad = ctx.createRadialGradient(W*.3,H*.4,0,W*.5,H*.5,Math.max(W,H)*.8);
    grad.addColorStop(0,'rgba(0,30,70,.95)');
    grad.addColorStop(.5,'rgba(5,10,24,.97)');
    grad.addColorStop(1,'rgba(2,4,14,1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Connexions
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<160){
          const a=(1-d/160)*.25;
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`hsla(${(pts[i].hue+pts[j].hue)/2},100%,70%,${a})`;
          ctx.lineWidth=.6;
          ctx.stroke();
        }
      }
    }

    // Points
    pts.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},100%,75%,.85)`;
      ctx.shadowColor=`hsl(${p.hue},100%,70%)`;
      ctx.shadowBlur=8;
      ctx.fill();
      ctx.shadowBlur=0;

      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',()=>{resize();initPts()});
  resize(); initPts(); draw();
})();

// ── LOGIN ───────────────────────────────────────────────────
async function doLogin(e){
  e.preventDefault();
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errMsg');
  err.classList.remove('show');
  btn.disabled = true;
  btn.classList.add('loading');

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try{
    const r = await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const d = await r.json();
    if(d.ok){
      btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(()=>{ window.location.href='/'; },400);
    } else {
      err.classList.remove('show');
      void err.offsetWidth; // reflow pour re-déclencher l'animation
      document.getElementById('errText').textContent = d.error || 'Email ou mot de passe incorrect';
      err.classList.add('show');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  } catch(ex){
    document.getElementById('errText').textContent = 'Erreur réseau, réessayez.';
    err.classList.add('show');
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function togglePwd(){
  const inp = document.getElementById('password');
  const ico = document.getElementById('eyeIcon');
  if(inp.type==='password'){
    inp.type='text';
    ico.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type='password';
    ico.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
</script>
</body>
</html>
